services:

  # ── Base de datos ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-authuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-authpass123}
      POSTGRES_DB:       ${DB_NAME:-authdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reconecta
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-authuser} -d ${DB_NAME:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgres://${DB_USER:-authuser}:${DB_PASSWORD:-authpass123}@db:5432/${DB_NAME:-authdb}
      JWT_SECRET:          ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL:        ${FRONTEND_URL:-http://localhost}
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost/api/auth/google/callback}
      MAIL_USER:           ${MAIL_USER:-}
      MAIL_PASSWORD:       ${MAIL_PASSWORD:-}
      MAIL_FROM:           ${MAIL_FROM:-ReConecta45 <noreply@reconecta45.com>}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reconecta

  # ── Frontend React + Nginx ────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - reconecta

networks:
  reconecta:
    driver: bridge

volumes:
  postgres_data:
